name: ci-pipeline
on:
  push:
    branches:
      - main
jobs:
  run-test-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - run: pytest
  build:
    needs: [run-test-code]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: build and release to DockerHub
        run: |
          docker build -t ${{ secrets.DOCKERHUB_REPO }} .
          docker tag ${{ secrets.DOCKERHUB_REPO }}:latest ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # 1. 사용할 환경 변수들을 등록합니다.
          envs: DOCKER_USERNAME, DOCKER_REPO, DOCKER_TOKEN
          debug: true  # <--- 이 설정을 추가해서 상세 로그를 보세요!
          timeout: 10s # 접속 시도 타임아웃 단축
          command_timeout: 1m
          request_pty: true
          use_insecure_cipher: true
          script: |  
            echo "Successfully Connected!"
            
            # 1.변수 조합 확인 (디버깅 로그) 및 로그인
            echo "Starting deployment for: $DOCKER_USERNAME/$DOCKER_REPO"
            echo "${DOCKER_TOKEN}" | sudo docker login -u "${DOCKER_USERNAME}" --password-stdin

            # 2. 최신 이미지 가져오기
            sudo docker pull $DOCKER_USERNAME/$DOCKER_REPO:latest
            
            # 3. 기존 컨테이너 안전하게 중지 및 삭제
            # 2>/dev/null은 에러 메시지를 숨기고, || true는 실패해도 다음 단계를 진행하게 합니다.
            sudo docker stop my-app-container 2>/dev/null || true
            sudo docker rm my-app-container 2>/dev/null || true
            
            # 4. 새 컨테이너 실행
            # 5000번 포트로 돌아가는 Flask/Node 앱을 80포트로 연결하는 예시입니다.
            sudo docker run -d \
              --name my-app-container \
              -p 80:5000 \
              --restart always \
              $DOCKER_USERNAME/$DOCKER_REPO:latest
            
            # 5. 불필요한 이미지(Dangling images) 정리
            sudo docker image prune -f

        # 0. GitHub Secrets를 SSH 환경 변수로 매핑합니다.
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_REPO: ${{ secrets.DOCKER_REPO }}
          DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}