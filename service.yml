apiVersion: v1
kind: Service
metadata:
  name: flaskweb-service
spec:
  type: NodePort
  selector:
    app: flaskweb  # Deployment의 labels와 일치해야 합니다.
  ports:
    - protocol: TCP
      port: 80         # 서비스의 가상 포트 (클러스터 내부 통신용)
      targetPort: 5000 # Pod(컨테이너) 내부에서 실제로 열려 있는 포트
      nodePort: 30008  # 외부에서 접속할 때 사용하는 포트 (30000-32767 사이 지정)